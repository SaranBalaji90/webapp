name: Claude Code

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-implement:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude Code Action
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: true
          track_progress: true
          label_trigger: "claude"
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Auto-create PR from Claude branch
        if: github.event_name == 'issue_comment'
        run: |
          sleep 5  # Give Claude time to push

          # Find the most recent Claude branch
          ISSUE_NUM="${{ github.event.issue.number }}"
          BRANCH=$(git ls-remote --heads origin "refs/heads/claude/issue-${ISSUE_NUM}-*" | sort -r | head -1 | awk '{print $2}' | sed 's|refs/heads/||')

          if [ -z "$BRANCH" ]; then
            echo "No Claude branch found for issue #${ISSUE_NUM}"
            exit 0
          fi

          echo "Found branch: $BRANCH"

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head $BRANCH --json number --jq '.[0].number' || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
          else
            # Get commit message for PR title
            git fetch origin $BRANCH
            TITLE=$(git log origin/$BRANCH -1 --pretty=%s)

            # Create PR with simple body
            PR_URL=$(gh pr create --base main --head $BRANCH --title "$TITLE" --body "Automated changes by Claude Code in response to issue #${ISSUE_NUM}. Closes #${ISSUE_NUM}" || echo "")

            if [ -n "$PR_URL" ]; then
              echo "✅ PR created: $PR_URL"

              # Trigger review
              PR_NUM=$(echo $PR_URL | grep -oP '\d+$')
              gh pr comment $PR_NUM --body "@claude review" || true

              # Update issue
              gh issue comment $ISSUE_NUM --body "✅ Pull request created: $PR_URL - Review has been triggered automatically."
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}

  claude-pr-update:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude') &&
       !contains(github.event.comment.body, 'review'))

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude Update PR
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: true
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' &&
       (github.event.action == 'opened' || github.event.action == 'synchronize') &&
       contains(github.event.pull_request.head.ref, 'claude/')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude') &&
       contains(github.event.comment.body, 'review'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: true
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

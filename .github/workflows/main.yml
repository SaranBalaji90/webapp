name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-implement:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' &&
       !github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: true
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Create Pull Request
        run: |
          # Get the branch name that Claude created
          BRANCH=$(git branch -r | grep 'origin/claude/' | sort -r | head -1 | sed 's|origin/||' | tr -d ' ')

          if [ -n "$BRANCH" ]; then
            git fetch origin
            git checkout $BRANCH

            # Check if PR already exists
            EXISTING_PR=$(gh pr list --head $BRANCH --json number --jq '.[0].number')

            if [ -z "$EXISTING_PR" ]; then
              # Create PR
              gh pr create \
                --base main \
                --head $BRANCH \
                --title "$(git log -1 --pretty=%s)" \
                --body "Automated changes by Claude Code in response to issue #${{ github.event.issue.number }}"

              echo "✅ Pull request created for branch: $BRANCH"
            else
              echo "PR already exists: #$EXISTING_PR"
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  claude-review:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' &&
       github.event.action == 'opened' &&
       contains(github.event.pull_request.head.ref, 'claude/')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_bedrock: true
          prompt: |
            You are reviewing a pull request. Please:
            1. Review the code changes for quality, security, and best practices
            2. Check for potential bugs or issues
            3. Verify the changes match the requirements
            4. If everything looks good, end your comment with "✅ LGTM - Ready to merge"
            5. If there are issues, clearly explain what needs to be fixed
        env:
          AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webapp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: float 3s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #f093fb, #f5576c, #4facfe);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    p { margin-top: 1rem; color: rgba(255,255,255,0.7); font-size: 1.1rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      border-radius: 999px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      color: #0f0c29;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 400px; height: 400px; background: #f093fb; top: -10%; left: -5%; }
    .orb2 { width: 300px; height: 300px; background: #4facfe; bottom: -10%; right: -5%; animation-delay: 2s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes shimmer { 0% { background-position: 0%; } 100% { background-position: 200%; } }
    @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(40px,30px); } }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="card">
    <h1>Hello, World! 🚀</h1>
    <p>A simple containerized webapp with a fancy UI</p>
    <span class="badge">Running in Docker</span>
  </div>
</body>
</html>
